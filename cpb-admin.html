<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPB Admin — GUDANG Cibitung</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  --bg:#0a0a0a; --surface:#111; --surface2:#161616; --surface3:#1a1a1a;
  --border:#1e1e1e; --border2:#2a2a2a;
  --accent:#e8ff00; --accent-dim:rgba(232,255,0,0.08);
  --text:#f0f0f0; --text2:#aaa; --muted:#555;
  --error:#ff4444; --success:#00e676; --warn:#ffb300;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* NAV */
.topnav{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(10,10,10,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;z-index:100;}
.nav-brand{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--accent);}
.nav-sep{color:var(--border2);font-size:18px;}
.nav-page{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.nav-back{margin-left:auto;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:5px 12px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all .2s;text-decoration:none;display:flex;align-items:center;gap:6px;}
.nav-back:hover{border-color:var(--accent);color:var(--accent);}

/* TABS */
.main-tabs{position:fixed;top:52px;left:0;right:0;height:44px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:4px;z-index:99;}
.tab-btn{background:transparent;border:1px solid transparent;border-radius:6px;padding:6px 14px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);cursor:pointer;text-transform:uppercase;transition:all .2s;}
.tab-btn:hover{color:var(--text2);}
.tab-btn.active{background:var(--accent-dim);border-color:rgba(232,255,0,0.15);color:var(--accent);}

/* CONTENT */
.content{margin-top:96px;padding:20px;max-width:880px;margin-left:auto;margin-right:auto;}
.content-section{display:none;} .content-section.active{display:block;animation:fadeUp .3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* SECTION HEADER */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;}
.btn-primary{background:var(--accent);color:#000;border:none;border-radius:8px;padding:9px 18px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;cursor:pointer;transition:all .2s;}
.btn-primary:hover{box-shadow:0 4px 16px rgba(232,255,0,0.2);transform:translateY(-1px);}
.btn-sec{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:9px 18px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;transition:all .2s;}
.btn-sec:hover{border-color:var(--muted);}

/* FORMULA CARDS */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
.formula-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;cursor:pointer;transition:all .2s;position:relative;}
.formula-card:hover{border-color:rgba(232,255,0,0.2);transform:translateY(-2px);}
.fc-name{font-weight:600;font-size:13px;margin-bottom:5px;line-height:1.4;}
.fc-code{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:12px;}
.fc-chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{font-family:'DM Mono',monospace;font-size:10px;padding:3px 8px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:4px;color:var(--muted);}
.card-actions{position:absolute;top:14px;right:14px;display:flex;gap:4px;opacity:0;transition:opacity .2s;}
.formula-card:hover .card-actions{opacity:1;}
.icon-btn{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:5px;width:26px;height:26px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);}
.icon-btn.del:hover{border-color:var(--error);color:var(--error);}

/* WO TABLE */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.wo-table{width:100%;border-collapse:collapse;}
.wo-table th{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface2);}
.wo-table td{padding:13px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
.wo-table tbody tr:last-child td{border-bottom:none;}
.wo-table tbody tr:hover td{background:rgba(255,255,255,0.01);}
.wo-no{font-family:'DM Mono',monospace;font-size:15px;font-weight:600;color:var(--accent);}
.wo-product{font-size:12px;color:var(--text2);margin-top:2px;}
.status-chip{display:inline-block;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;padding:3px 10px;border-radius:4px;text-transform:uppercase;}
.s-pending{background:rgba(255,179,0,.1);color:#ffb300;border:1px solid rgba(255,179,0,.2);}
.s-gudang{background:rgba(0,207,255,.1);color:#00cfff;border:1px solid rgba(0,207,255,.2);}
.s-approved{background:rgba(0,230,118,.1);color:#00e676;border:1px solid rgba(0,230,118,.2);}
.s-selesai{background:rgba(232,255,0,.1);color:#e8ff00;border:1px solid rgba(232,255,0,.2);}
.td-actions{display:flex;gap:4px;}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(4px);z-index:200;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:700px;margin:auto;animation:fadeUp .3s ease both;}
.modal-header{padding:22px 26px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;}
.modal-close{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;width:30px;height:30px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.modal-close:hover{border-color:var(--error);color:var(--error);}
.modal-body{padding:22px 26px;}
.modal-footer{padding:14px 26px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}

/* STEP INDICATOR */
.steps{display:flex;gap:8px;margin-bottom:22px;}
.step{flex:1;padding:8px 0;border-bottom:2px solid var(--border);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;text-align:center;transition:all .2s;}
.step.active{border-color:var(--accent);color:var(--accent);}
.step.done{border-color:rgba(0,230,118,.4);color:#00e676;}

/* FORM FIELDS */
.field{margin-bottom:14px;}
.field label{display:block;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:7px;}
.field input,.field select,.field textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:11px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:all .2s;}
.field input:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,255,0,.05);}
.field select option{background:#111;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

/* BB SECTION (formula items) */
.sub-tabs{display:flex;gap:3px;margin-bottom:16px;background:var(--bg);padding:3px;border-radius:7px;border:1px solid var(--border);}
.sub-tab{flex:1;background:transparent;border:none;border-radius:5px;padding:7px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--muted);cursor:pointer;transition:all .2s;text-transform:uppercase;}
.sub-tab.active{background:var(--surface);color:var(--accent);}
.sub-section{display:none;} .sub-section.active{display:block;}

.bb-row{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:8px;}
.bb-row-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bb-no{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);min-width:32px;}
.bb-del{margin-left:auto;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:5px;width:26px;height:26px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.bb-del:hover{border-color:var(--error);color:var(--error);}
.alt-item{display:grid;grid-template-columns:90px 1fr 18px;gap:6px;align-items:center;margin-bottom:6px;}
.alt-input{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 9px;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;outline:none;transition:border-color .2s;width:100%;}
.alt-input.wide{font-family:'DM Sans',sans-serif;font-size:12px;}
.alt-input:focus{border-color:rgba(232,255,0,.3);}
.alt-rem{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:color .2s;padding:0;}
.alt-rem:hover{color:var(--error);}
.btn-add-alt{width:100%;background:transparent;border:1px dashed var(--border);color:var(--muted);border-radius:6px;padding:6px;font-size:11px;cursor:pointer;transition:all .2s;margin-bottom:10px;}
.btn-add-alt:hover{border-color:var(--accent);color:var(--accent);}
.qty-row{display:grid;grid-template-columns:80px 1fr;gap:8px;}
.btn-add-row{width:100%;background:transparent;border:1px dashed var(--border2);color:var(--muted);border-radius:8px;padding:10px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all .2s;text-transform:uppercase;}
.btn-add-row:hover{border-color:var(--accent);color:var(--accent);}

/* MSG */
.msg{padding:10px 14px;border-radius:7px;font-size:12px;margin-top:10px;display:none;}
.msg.error{background:rgba(255,68,68,.08);border:1px solid rgba(255,68,68,.2);color:var(--error);display:block;}
.msg.success{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);color:var(--success);display:block;}

/* PRINT OVERLAY */
.print-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
.print-overlay.open{display:flex;}
.label-card{background:#fff;color:#000;border-radius:8px;padding:20px 20px 16px;width:260px;text-align:center;font-family:'DM Sans',sans-serif;}
.lbl-brand{font-size:8px;letter-spacing:2px;color:#888;margin-bottom:2px;text-transform:uppercase;}
.lbl-doc{font-size:9px;font-weight:600;color:#555;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;}
.lbl-wo{font-size:28px;font-weight:800;letter-spacing:3px;margin:6px 0 2px;color:#111;}
.lbl-product{font-size:10px;font-weight:600;color:#333;margin-bottom:2px;}
.lbl-date{font-size:9px;color:#888;}
.print-btns{display:flex;gap:10px;}
.btn-print{background:var(--accent);color:#000;border:none;border-radius:8px;padding:11px 22px;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;cursor:pointer;}
.btn-close-p{background:transparent;border:1px solid #444;color:#aaa;border-radius:8px;padding:11px 22px;font-size:12px;cursor:pointer;}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-text{font-size:13px;}

.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}

@media print {
  body>*:not(.print-overlay){display:none!important;}
  .print-overlay{position:static;background:white!important;display:flex!important;}
  .print-btns{display:none!important;}
  .label-card{box-shadow:none;border:1px solid #ddd;}
}
</style>
</head>

<nav class="topnav">

</nav>

<!-- CONTENT -->

</div>

<!-- MODAL: ADD FORMULA -->

            <label>Lokasi Plant</label>
            <input type="text" id="f-plant" value="CIBITUNG"/>

        <div class="field">
          <label>Lini Proses</label>
          <input type="text" id="f-lini" placeholder="PLE Mixing - PLE"/>

        <div class="field-row-3">
          <div class="field">

      <!-- STEP 2: BAHAN BAKU -->

          <div id="rows-koma"></div>
          <button class="btn-add-row" data-section="koma">+ Tambah Baris (Koma)</button>
        </div>
        <div id="sec-premix" class="sub-section">
          <div id="rows-premix"></div>
          <button class="btn-add-row" data-section="premix">+ Tambah Baris (Premix)</button>
        </div>
      </div>

      <div class="msg" id="formulaMsg"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-sec" id="formulaBack" style="display:none;">← Kembali</button>
      <button class="btn-sec" id="closeFormula2">Batal</button>
      <button class="btn-primary" id="formulaNext">Lanjut →</button>
    </div>
  </div>
</div>

<!-- MODAL: ADD WO -->

  </div>
</div>

// ── Auth guard ───────────────────────────────────────────────
onAuthStateChanged(auth, user => {
  if (!user) { window.location.href = 'index.html'; return; }
  loadFormulas();
  loadWOs();
});

// ── State ────────────────────────────────────────────────────
let formulaList = [];
let woList = [];
let currentStep = 1;
let currentSubTab = 'utuh';
let bbData = { utuh:[], koma:[], premix:[] };
let rowCounters = { utuh:0, koma:0, premix:0 };

// ── Tab navigation ───────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// ── Sub-tabs (utuh/koma/premix) ──────────────────────────────
document.querySelectorAll('.sub-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    currentSubTab = btn.dataset.section;
    document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.sub-section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('sec-' + currentSubTab).classList.add('active');
  });
});

// ── FORMULA MODAL ────────────────────────────────────────────
function openFormulaModal() {
  currentStep = 1;
  bbData = { utuh:[], koma:[], premix:[] };
  rowCounters = { utuh:0, koma:0, premix:0 };
  document.getElementById('rows-utuh').innerHTML = '';
  document.getElementById('rows-koma').innerHTML = '';
  document.getElementById('rows-premix').innerHTML = '';
  ['f-nama','f-kode','f-revisi','f-revisiop','f-lini','f-ratio','f-size'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-tgl').value = '';
  document.getElementById('f-plant').value = 'CIBITUNG';
  document.getElementById('f-unit').value = 'g';
  showStep(1);
  showMsg('formulaMsg','','');
  document.getElementById('overlayFormula').classList.add('open');
}

function closeFormulaModal() {
  document.getElementById('overlayFormula').classList.remove('open');
}

function showStep(step) {
  currentStep = step;
  document.getElementById('step1').style.display = step === 1 ? 'block' : 'none';
  document.getElementById('step2').style.display = step === 2 ? 'block' : 'none';
  document.getElementById('formulaBack').style.display = step === 2 ? 'inline-flex' : 'none';
  document.getElementById('formulaNext').textContent = step === 1 ? 'Lanjut →' : '💾 Simpan Formula';
  document.querySelectorAll('.step').forEach(s => {
    const n = parseInt(s.dataset.step);
    s.classList.toggle('active', n === step);
    s.classList.toggle('done', n < step);
  });
}

document.getElementById('btnAddFormula').addEventListener('click', openFormulaModal);
document.getElementById('closeFormula').addEventListener('click', closeFormulaModal);
document.getElementById('closeFormula2').addEventListener('click', closeFormulaModal);
document.getElementById('formulaBack').addEventListener('click', () => showStep(1));

document.getElementById('formulaNext').addEventListener('click', async () => {
  if (currentStep === 1) {
    const nama = document.getElementById('f-nama').value.trim();
    const kode = document.getElementById('f-kode').value.trim();
    if (!nama || !kode) { showMsg('formulaMsg','Nama dan kode formula wajib diisi.','error'); return; }
    showMsg('formulaMsg','','');
    showStep(2);
  } else {
    await saveFormula();
  }
});

// ── ADD ROW (event delegation on modal body) ─────────────────
document.getElementById('overlayFormula').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;

  // Add row
  if (btn.classList.contains('btn-add-row')) {
    addBBRow(btn.dataset.section);
    return;
  }
  // Add alternative
  if (btn.classList.contains('btn-add-alt')) {
    addAlt(btn.dataset.rowid, btn.dataset.section);
    return;
  }
  // Remove alt
  if (btn.classList.contains('alt-rem')) {
    removeAlt(btn.dataset.rowid, btn.dataset.altid, btn.dataset.section);
    return;
  }
  // Delete row
  if (btn.classList.contains('bb-del')) {
    delRow(btn.dataset.rowid, btn.dataset.section);
    return;
  }
});

function addBBRow(section) {
  rowCounters[section]++;
  const rowId = `${section}_${rowCounters[section]}`;
  const no    = bbData[section].length + 1;
  const row   = { id: rowId, no, alts:[{ id: rowId+'_a1', kode:'', nama:'' }], jumlah:'', uom:'' };
  bbData[section].push(row);
  renderRows(section);
}

function addAlt(rowId, section) {
  const row = bbData[section].find(r => r.id === rowId);
  if (!row) return;
  const altId = rowId + '_a' + (row.alts.length + 1) + '_' + Date.now();
  row.alts.push({ id: altId, kode:'', nama:'' });
  renderRows(section);
}

function removeAlt(rowId, altId, section) {
  const row = bbData[section].find(r => r.id === rowId);
  if (!row || row.alts.length <= 1) return;
  row.alts = row.alts.filter(a => a.id !== altId);
  renderRows(section);
}

function delRow(rowId, section) {
  bbData[section] = bbData[section].filter(r => r.id !== rowId);
  bbData[section].forEach((r,i) => r.no = i+1);
  renderRows(section);
}

function collectInputs(section) {
  bbData[section].forEach(row => {
    row.alts.forEach(alt => {
      const kodeEl = document.getElementById('kode_'+alt.id);
      const namaEl = document.getElementById('nama_'+alt.id);
      if (kodeEl) alt.kode = kodeEl.value.trim();
      if (namaEl) alt.nama = namaEl.value.trim();
    });
    const jEl = document.getElementById('jumlah_'+row.id);
    const uEl = document.getElementById('uom_'+row.id);
    if (jEl) row.jumlah = jEl.value.trim();
    if (uEl) row.uom = uEl.value.trim();
  });
}

function renderRows(section) {
  collectInputs(section);
  const container = document.getElementById('rows-' + section);
  if (!bbData[section].length) { container.innerHTML = ''; return; }
  container.innerHTML = bbData[section].map(row => `
    <div class="bb-row">
      <div class="bb-row-top">
        <span class="bb-no">${row.no}</span>
        <small style="color:var(--muted);font-size:11px;">Bahan Baku (klik + untuk alternatif)</small>
        <button class="bb-del" data-rowid="${row.id}" data-section="${section}" title="Hapus baris">✕</button>
      </div>
      ${row.alts.map(alt => `
        <div class="alt-item">
          <input class="alt-input" id="kode_${alt.id}" placeholder="Kode" value="${alt.kode}"/>
          <input class="alt-input wide" id="nama_${alt.id}" placeholder="Nama Bahan Baku" value="${alt.nama}"/>
          <button class="alt-rem" data-rowid="${row.id}" data-altid="${alt.id}" data-section="${section}" title="Hapus">✕</button>
        </div>
      `).join('')}
      <button class="btn-add-alt" data-rowid="${row.id}" data-section="${section}">+ Tambah Alternatif</button>
      <div class="qty-row">
        <input class="alt-input" id="jumlah_${row.id}" placeholder="Jumlah" value="${row.jumlah}" style="text-align:center;"/>
        <input class="alt-input wide" id="uom_${row.id}" placeholder="Satuan (SAK, BAL, KANTONG...)" value="${row.uom}"/>
      </div>
    </div>
  `).join('');
}

async function saveFormula() {
  ['utuh','koma','premix'].forEach(s => collectInputs(s));
  const btn = document.getElementById('formulaNext');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  try {
    const data = {
      namaFormula: document.getElementById('f-nama').value.trim(),
      kodeFormula: document.getElementById('f-kode').value.trim(),
      revisiFormula: document.getElementById('f-revisi').value.trim(),
      revisiOp: document.getElementById('f-revisiop').value.trim(),
      tanggalBerlaku: document.getElementById('f-tgl').value,
      plant: document.getElementById('f-plant').value.trim(),
      liniProses: document.getElementById('f-lini').value.trim(),
      batchRatio: document.getElementById('f-ratio').value.trim(),
      batchSize: document.getElementById('f-size').value.trim(),
      batchUnit: document.getElementById('f-unit').value,
      utuh:   bbData.utuh,
      koma:   bbData.koma,
      premix: bbData.premix,
      createdAt: serverTimestamp(),
    };
    await addDoc(collection(db, 'formulas'), data);
    showMsg('formulaMsg','✅ Formula berhasil disimpan!','success');
    setTimeout(() => { closeFormulaModal(); loadFormulas(); }, 1000);
  } catch(e) {
    showMsg('formulaMsg','Gagal menyimpan: ' + e.message,'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '💾 Simpan Formula';
  }
}

// ── LOAD FORMULAS ────────────────────────────────────────────
async function loadFormulas() {
  const grid = document.getElementById('formulaGrid');
  try {
    const snap = await getDocs(collection(db, 'formulas'));
    formulaList = [];
    snap.forEach(d => formulaList.push({ id: d.id, ...d.data() }));
    if (!formulaList.length) {
      grid.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Belum ada formula. Klik "+ Tambah Formula".</div></div>`;
      return;
    }
    grid.innerHTML = formulaList.map(f => `
      <div class="formula-card">
        <div class="card-actions">
          <button class="icon-btn del" data-id="${f.id}" title="Hapus">🗑</button>
        </div>
        <div class="fc-name">${f.namaFormula}</div>
        <div class="fc-code">${f.kodeFormula} · Rev: ${f.revisiFormula || '-'}</div>
        <div class="fc-chips">
          <span class="chip">${f.plant || 'CIBITUNG'}</span>
          <span class="chip">${f.liniProses || '-'}</span>
          <span class="chip">Utuh: ${(f.utuh||[]).length} baris</span>
          <span class="chip">Koma: ${(f.koma||[]).length} baris</span>
        </div>
      </div>
    `).join('');

    // delete handlers
    grid.querySelectorAll('.icon-btn.del').forEach(btn => {
      btn.addEventListener('click', async e => {
        e.stopPropagation();
        if (!confirm('Hapus formula ini?')) return;
        await deleteDoc(doc(db, 'formulas', btn.dataset.id));
        loadFormulas();
      });
    });

    // populate WO formula dropdown
    const sel = document.getElementById('wo-formula');
    sel.innerHTML = '<option value="">-- Pilih Formula --</option>';
    formulaList.forEach(f => {
      const opt = document.createElement('option');
      opt.value = f.id;
      opt.textContent = f.namaFormula + ' (' + f.kodeFormula + ')';
      sel.appendChild(opt);
    });
  } catch(e) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Gagal memuat formula.</div></div>`;
  }
}

// ── WO MODAL ─────────────────────────────────────────────────
document.getElementById('btnAddWO').addEventListener('click', () => {
  ['wo-no','wo-batch','wo-lok1','wo-lok2','wo-lok3'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('wo-formula').value = '';
  document.getElementById('wo-tgl').value = new Date().toISOString().split('T')[0];
  showMsg('woMsg','','');
  document.getElementById('overlayWO').classList.add('open');
});
document.getElementById('closeWO').addEventListener('click', () => document.getElementById('overlayWO').classList.remove('open'));
document.getElementById('closeWO2').addEventListener('click', () => document.getElementById('overlayWO').classList.remove('open'));

document.getElementById('saveWO').addEventListener('click', async () => {
  const noWO    = document.getElementById('wo-no').value.trim();
  const fId     = document.getElementById('wo-formula').value;
  const tgl     = document.getElementById('wo-tgl').value;
  const btn     = document.getElementById('saveWO');

  if (!noWO || !fId || !tgl) { showMsg('woMsg','No. WO, Formula, dan Tanggal wajib diisi.','error'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  try {
    const formula = formulaList.find(f => f.id === fId);
    const woData = {
      noWO,
      noBatch: document.getElementById('wo-batch').value.trim(),
      formulaId: fId,
      namaFormula: formula?.namaFormula || '-',
      kodeFormula: formula?.kodeFormula || '-',
      tanggal: tgl,
      groupLokasi1: document.getElementById('wo-lok1').value.trim(),
      groupLokasi2: document.getElementById('wo-lok2').value.trim(),
      groupLokasi3: document.getElementById('wo-lok3').value.trim(),
      status: 'pending',
      createdAt: serverTimestamp(),
    };
    await addDoc(collection(db, 'work_orders'), woData);
    document.getElementById('overlayWO').classList.remove('open');
    await loadWOs();
    // Auto-show print label for new WO
    openPrintLabel({ ...woData, id: 'new' });
  } catch(e) {
    showMsg('woMsg','Gagal membuat WO: ' + e.message,'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Buat WO + Label';
  }
});

// ── LOAD WOs ─────────────────────────────────────────────────
async function loadWOs() {
  const tbody = document.getElementById('woTableBody');
  try {
    const snap = await getDocs(query(collection(db, 'work_orders'), orderBy('createdAt','desc')));
    woList = [];
    snap.forEach(d => woList.push({ id: d.id, ...d.data() }));
    if (!woList.length) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--muted);">Belum ada Work Order.</td></tr>';
      return;
    }
    const statusMap = {
      pending:          { label:'Menunggu',        cls:'s-pending' },
      gudang_progress:  { label:'Cek Gudang',      cls:'s-gudang' },
      gudang_approved:  { label:'Gudang ✓',        cls:'s-approved' },
      produksi_progress:{ label:'Cek Produksi',    cls:'s-gudang' },
      selesai:          { label:'Selesai',          cls:'s-selesai' },
    };
    tbody.innerHTML = woList.map(wo => {
      const st = statusMap[wo.status] || { label: wo.status, cls:'s-pending' };
      const tgl = wo.tanggal ? new Date(wo.tanggal).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}) : '-';
      return `
        <tr>
          <td><div class="wo-no">WO-${wo.noWO}</div>${wo.noBatch ? '<div class="wo-product">Batch: '+wo.noBatch+'</div>' : ''}</td>
          <td><div style="font-size:13px;">${wo.namaFormula}</div><div class="wo-product">${wo.kodeFormula}</div></td>
          <td style="font-size:12px;color:var(--text2);">${tgl}</td>
          <td><span class="status-chip ${st.cls}">${st.label}</span></td>
          <td>
            <div class="td-actions">
              <button class="icon-btn" data-wo='${JSON.stringify({noWO:wo.noWO,namaFormula:wo.namaFormula,tanggal:wo.tanggal})}' title="Print Label">🖨</button>
              <button class="icon-btn del" data-id="${wo.id}" title="Hapus">🗑</button>
            </div>
          </td>
        </tr>
      `;
    }).join('');

    // print handlers
    tbody.querySelectorAll('.icon-btn:not(.del)').forEach(btn => {
      btn.addEventListener('click', () => {
        const wo = JSON.parse(btn.dataset.wo);
        openPrintLabel(wo);
      });
    });

    // delete handlers
    tbody.querySelectorAll('.icon-btn.del').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('Hapus WO ini?')) return;
        await deleteDoc(doc(db, 'work_orders', btn.dataset.id));
        loadWOs();
      });
    });
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--error);">Gagal memuat data.</td></tr>`;
  }
}

// ── PRINT LABEL ───────────────────────────────────────────────
let qrInstance = null;
function openPrintLabel(wo) {
  document.getElementById('lbl-wo-no').textContent = 'WO-' + wo.noWO;
  document.getElementById('lbl-wo-product').textContent = wo.namaFormula;
  const tgl = wo.tanggal ? new Date(wo.tanggal + 'T00:00:00').toLocaleDateString('id-ID', {day:'2-digit',month:'long',year:'numeric'}) : '-';
  document.getElementById('lbl-wo-date').textContent = tgl;

  const qrEl = document.getElementById('qr-container');
  qrEl.innerHTML = '';
  try {
    qrInstance = new QRCode(qrEl, {
      text: 'WO-' + wo.noWO,
      width: 110, height: 110,
      colorDark: '#000000', colorLight: '#ffffff',
    });
  } catch(e) { qrEl.textContent = 'WO-' + wo.noWO; }

  document.getElementById('printOverlay').classList.add('open');
}

document.getElementById('closePrint').addEventListener('click', () => {
  document.getElementById('printOverlay').classList.remove('open');
});
document.getElementById('doPrint').addEventListener('click', () => window.print());

// ── UTILS ─────────────────────────────────────────────────────
function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + (type || '');
}
</script>
