<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CBB — My Penata</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#161616;
  --border:#1e1e1e;--border2:#2a2a2a;
  --accent:#e8ff00;--accent-dim:rgba(232,255,0,0.07);
  --text:#f0f0f0;--text2:#aaa;--muted:#555;
  --error:#ff4444;--success:#00e676;--warn:#ffb300;
  --blue:#00cfff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}

/* ── TOP NAV ── */
.topnav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,10,10,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.nav-row1{display:flex;align-items:center;padding:0 14px;height:50px;gap:10px;}
.nav-brand{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--accent);}
.nav-sep{color:var(--border2);}
.nav-page{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.nav-back{margin-left:auto;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:5px 12px;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;transition:all .2s;text-decoration:none;display:flex;align-items:center;gap:5px;}
.nav-back:hover{border-color:var(--accent);color:var(--accent);}

/* ── DAY TABS ── */
.day-tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{flex:1;min-width:60px;padding:9px 4px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;text-align:center;cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;position:relative;}
.day-tab.active{color:var(--accent);border-color:var(--accent);}
.day-tab.today::after{content:'';position:absolute;top:6px;right:8px;width:5px;height:5px;background:var(--accent);border-radius:50%;}
.day-tab.has-data{color:var(--text2);}
.day-tab.has-data.done-all{color:var(--success);border-color:rgba(0,230,118,.3);}
.day-date{display:block;font-size:10px;font-weight:600;margin-bottom:1px;}

/* ── SECTION TABS ── */
.sec-tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;z-index:80;}
.sec-tab{flex:1;padding:9px 4px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;text-align:center;cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:all .2s;}
.sec-tab.active{color:var(--blue);border-color:var(--blue);}
.sec-prog{display:block;font-size:12px;font-weight:700;margin-bottom:2px;}

/* ── TOP AREA STICKY HEIGHT ── */
.spacer{height:130px;}

/* ── MAIN CONTENT ── */
.content{padding:8px 10px 120px;}

/* ── INFO BANNER ── */
.week-info{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.week-info-left{font-size:12px;color:var(--muted);}
.week-info-name{font-weight:600;color:var(--text);font-size:13px;}
.status-badge{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;padding:3px 10px;border-radius:4px;text-transform:uppercase;}
.sb-draft{background:rgba(255,179,0,.1);color:var(--warn);border:1px solid rgba(255,179,0,.2);}
.sb-submitted{background:rgba(0,207,255,.1);color:var(--blue);border:1px solid rgba(0,207,255,.2);}
.sb-verified{background:rgba(0,230,118,.1);color:var(--success);border:1px solid rgba(0,230,118,.2);}
.sb-empty{background:rgba(255,255,255,.03);color:var(--muted);border:1px solid var(--border);}

/* ── ITEM CARDS ── */
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;transition:border-color .2s;}
.item-card.checked{border-left:3px solid var(--success);}
.item-card.na{opacity:.45;}
.item-header{display:flex;align-items:flex-start;gap:10px;padding:12px 12px 10px;}
.item-no{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);min-width:28px;line-height:1;}
.item-info{flex:1;}
.item-area{font-size:13px;font-weight:600;margin-bottom:2px;}
.item-objek{font-size:11px;color:var(--text2);margin-bottom:4px;}
.item-badges{display:flex;gap:4px;flex-wrap:wrap;}
.badge-metode{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;padding:2px 7px;border-radius:3px;text-transform:uppercase;}
.b-pel{background:rgba(0,207,255,.1);color:var(--blue);border:1px solid rgba(0,207,255,.2);}
.b-wet{background:rgba(100,180,255,.1);color:#64b4ff;border:1px solid rgba(100,180,255,.2);}
.b-dry{background:rgba(255,179,0,.1);color:var(--warn);border:1px solid rgba(255,179,0,.2);}
.b-lap{background:rgba(179,136,255,.1);color:#b388ff;border:1px solid rgba(179,136,255,.2);}
.badge-freq{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:3px;background:rgba(255,255,255,.04);color:var(--muted);border:1px solid var(--border);}
.item-na-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;}

/* big checkbox */
.item-check-col{display:flex;flex-direction:column;align-items:center;gap:6px;}
.big-check{width:36px;height:36px;border:2px solid var(--border2);border-radius:8px;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;flex-shrink:0;}
.big-check.on{background:rgba(0,230,118,.1);border-color:var(--success);}
.big-check:disabled{cursor:not-allowed;opacity:.4;}

/* photo */
.item-photo-row{padding:0 12px 12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.btn-photo{background:transparent;border:1px dashed var(--border2);color:var(--muted);border-radius:7px;padding:7px 12px;font-size:11px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;}
.btn-photo:hover{border-color:var(--warn);color:var(--warn);}
.photo-thumb{width:52px;height:52px;border-radius:6px;object-fit:cover;border:1px solid var(--border);cursor:pointer;}
.photo-remove{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.2);color:var(--error);border-radius:5px;width:24px;height:24px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.photo-remove:hover{background:rgba(255,68,68,.2);}
.photo-input{display:none;}

/* ── SUB ITEMS (Penimbangan) ── */
.sub-items{padding:0 12px 12px;}
.sub-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03);}
.sub-item:last-child{border-bottom:none;}
.sub-check{width:24px;height:24px;border:1.5px solid var(--border2);border-radius:5px;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s;flex-shrink:0;}
.sub-check.on{background:rgba(0,230,118,.1);border-color:var(--success);}
.sub-check:disabled{cursor:not-allowed;opacity:.4;}
.sub-info{flex:1;}
.sub-objek{font-size:12px;color:var(--text2);}
.sub-param{font-size:10px;color:var(--muted);margin-top:1px;}
.sub-photo-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 6px;transition:color .2s;}
.sub-photo-btn:hover{color:var(--warn);}
.sub-photo-wrap{display:flex;align-items:center;gap:6px;padding:4px 0 4px 34px;}
.sub-photo-thumb{width:40px;height:40px;border-radius:5px;object-fit:cover;border:1px solid var(--border);}

/* ── FOOTER ── */
.footer{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:10px 14px;display:none;}
.footer.show{display:block;}
.footer-inner{display:flex;gap:8px;max-width:600px;margin:0 auto;}
.btn-save{flex:1;background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:12px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all .2s;}
.btn-save:hover{border-color:var(--muted);}
.btn-submit{flex:2;background:var(--accent);color:#000;border:none;border-radius:8px;padding:12px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;transition:all .2s;}
.btn-submit:disabled{opacity:.4;cursor:not-allowed;}
.btn-approve{width:100%;background:var(--success);color:#000;border:none;border-radius:8px;padding:13px;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;cursor:pointer;transition:all .2s;}
.btn-penyelia-view{width:100%;background:transparent;border:1px solid var(--blue);color:var(--blue);border-radius:8px;padding:11px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;}

/* ── LOADING ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 50px);gap:12px;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
.spinner-sm{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 20px;font-size:13px;z-index:300;display:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5);}
.toast.show{display:block;animation:fadeUp .2s ease both;}
.toast.success{border-color:rgba(0,230,118,.3);color:var(--success);}
.toast.error{border-color:rgba(255,68,68,.3);color:var(--error);}
@keyframes fadeUp{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}

/* ── LIGHTBOX ── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:400;display:none;align-items:center;justify-content:center;}
.lightbox.open{display:flex;}
.lightbox img{max-width:96%;max-height:90vh;border-radius:8px;}
.lightbox-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer;}

/* ── CATATAN ── */
.catatan-area{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;}
.catatan-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:7px;}
.catatan-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;resize:vertical;min-height:56px;transition:border-color .2s;}
.catatan-input:focus{border-color:var(--accent);}

/* EMPTY DAY */
.empty-day{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-day-icon{font-size:40px;margin-bottom:10px;}

/* VERIFIED BANNER */
.verified-banner{background:rgba(0,230,118,.06);border:1px solid rgba(0,230,118,.2);border-radius:10px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.verified-icon{font-size:32px;flex-shrink:0;}
.verified-info{flex:1;}
.verified-title{font-size:14px;font-weight:700;color:var(--success);margin-bottom:3px;}
.verified-detail{font-size:11px;color:var(--text2);line-height:1.5;}
.btn-export{background:transparent;border:1px solid rgba(0,230,118,.3);color:var(--success);border-radius:7px;padding:8px 14px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all .2s;flex-shrink:0;white-space:nowrap;}
.btn-export:hover{background:rgba(0,230,118,.1);}

/* INDEPENDENCE NOTICE */
.indep-notice{background:rgba(0,207,255,.04);border:1px solid rgba(0,207,255,.12);border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:11px;color:var(--blue);line-height:1.5;display:none;}
.indep-notice.show{display:flex;align-items:flex-start;gap:8px;}
.indep-notice-icon{flex-shrink:0;}

/* ═══ PRINT ═══ */
.print-area{display:none;}
@media print {
  body > *:not(.print-area){display:none !important;}
  .print-area{display:block !important;font-family:Arial,sans-serif;font-size:9pt;color:#000;padding:10mm;}
  .p-header{text-align:center;border-bottom:2px solid #000;padding-bottom:5mm;margin-bottom:5mm;}
  .p-title{font-size:13pt;font-weight:bold;letter-spacing:1px;}
  .p-sub{font-size:8pt;color:#444;margin-top:2mm;}
  .p-meta{display:grid;grid-template-columns:1fr 1fr;gap:2mm 8mm;margin-bottom:5mm;font-size:8.5pt;}
  .p-meta b{display:inline-block;min-width:90px;}
  .p-sec-title{font-size:10pt;font-weight:bold;background:#eee;padding:2mm 3mm;margin:4mm 0 2mm;border-left:3px solid #000;}
  .p-table{width:100%;border-collapse:collapse;margin-bottom:4mm;font-size:7.5pt;}
  .p-table th{background:#e5e5e5;border:1px solid #999;padding:1.5mm 2mm;font-size:7pt;text-align:center;}
  .p-table td{border:1px solid #ccc;padding:1.5mm 2mm;}
  .p-table .c-no{width:7mm;text-align:center;font-weight:bold;}
  .p-table .c-check{width:10mm;text-align:center;}
  .p-table .c-photo{width:10mm;text-align:center;}
  .p-sign{display:grid;grid-template-columns:1fr 1fr;gap:10mm;margin-top:8mm;padding-top:4mm;border-top:1px solid #000;}
  .p-sign-box{text-align:center;}
  .p-sign-line{border-bottom:1px solid #000;height:14mm;margin-bottom:2mm;}
  .p-sign-label{font-size:8pt;font-weight:bold;}
  .p-sign-date{font-size:7pt;color:#555;margin-top:1mm;}
  .p-footer{margin-top:4mm;padding-top:2mm;border-top:1px solid #ccc;font-size:7pt;color:#777;display:flex;justify-content:space-between;}
  @page{size:A4;margin:10mm;}
}
</style>
</head>

// Frequency check
const DAY_FREQ = {
  daily: [0,1,2,3,4],
  mrf:   [0,2,4],
  tk:    [1,3],
};
function isActiveToday(freq, dayIdx) {
  return DAY_FREQ[freq]?.includes(dayIdx) ?? true;
}

// ── STATE ─────────────────────────────────────────────────────
let currentUser = null;
let currentDayIdx = null;
let currentSec = 'storage';
let weekDates = [];
let recordData = {}; // {dayKey: {docId, data}}
let hasChanges = false;

// ── AUTH ─────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = 'index.html'; return; }
  const snap = await getDoc(doc(db,'users', user.uid));
  if (!snap.exists()) { window.location.href = 'index.html'; return; }
  currentUser = { uid: user.uid, ...snap.data() };
  initWeek();
  await loadAllRecords();
  buildDayTabs();
  const todayIdx = getTodayIdx();
  selectDay(todayIdx >= 0 ? todayIdx : 0);
  document.getElementById('loadingWrap').style.display = 'none';
  document.getElementById('mainWrap').style.display = 'block';
});

// ── WEEK INIT ─────────────────────────────────────────────────
function initWeek() {
  const now = new Date();
  const day = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
  weekDates = Array.from({length:5}, (_,i) => {
    const d = new Date(mon); d.setDate(mon.getDate() + i);
    return d;
  });
}

function dayKey(idx) {
  return weekDates[idx]?.toISOString().split('T')[0] || '';
}

function getTodayIdx() {
  const t = new Date().toISOString().split('T')[0];
  return weekDates.findIndex(d => d.toISOString().split('T')[0] === t);
}

// ── LOAD RECORDS ──────────────────────────────────────────────
async function loadAllRecords() {
  // Query by explicit date strings for this week — avoids month-boundary bugs
  const dateKeys = weekDates.map((d,i) => dayKey(i)).filter(Boolean);
  if (!dateKeys.length) return;
  try {
    const snap = await getDocs(query(
      collection(db,'cbb_records'),
      where('tanggal','in', dateKeys)
    ));
    snap.forEach(d => {
      const data = d.data();
      recordData[data.tanggal] = { docId: d.id, data };
    });
  } catch(e) { console.error(e); showToast('Gagal memuat data: '+e.message,'error'); }
}

// ── DAY TABS ─────────────────────────────────────────────────
const DAY_NAMES = ['Senin','Selasa','Rabu','Kamis','Jumat'];
function buildDayTabs() {
  const todayIdx = getTodayIdx();
  document.getElementById('dayTabs').innerHTML = DAY_NAMES.map((name, i) => {
    const rec = recordData[dayKey(i)];
    const isDone = rec?.data?.status === 'submitted' || rec?.data?.status === 'verified';
    const hasData = !!rec;
    return `<button class="day-tab ${i===todayIdx?'today':''} ${hasData?'has-data':''} ${isDone?'done-all':''}" data-idx="${i}">
      <span class="day-date">${weekDates[i]?.getDate()}</span>${name}
    </button>`;
  }).join('');
  document.querySelectorAll('.day-tab').forEach(btn => {
    btn.addEventListener('click', () => selectDay(parseInt(btn.dataset.idx)));
  });
}

// ── SELECT DAY ────────────────────────────────────────────────
function selectDay(idx) {
  currentDayIdx = idx;
  document.querySelectorAll('.day-tab').forEach((b,i) => b.classList.toggle('active', i===idx));
  renderDay();
}

function renderDay() {
  const idx = currentDayIdx;
  const key = dayKey(idx);
  const rec = recordData[key];
  const role = currentUser?.role;
  const status = rec?.data?.status || 'empty';

  // Week info
  document.getElementById('weekInfoName').textContent = DAY_NAMES[idx] + ', ' +
    weekDates[idx]?.toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});

  const staffName = rec?.data?.namaStaff || '-';
  document.getElementById('weekInfoSub').textContent =
    rec ? `Diisi oleh: ${staffName}` : 'Belum diisi hari ini';

  // Status badge
  const sb = document.getElementById('statusBadge');
  const statusMap = {
    empty:     ['Belum Diisi','sb-empty'],
    draft:     ['Draft','sb-draft'],
    submitted: ['Menunggu Verifikasi','sb-submitted'],
    verified:  ['Terverifikasi ✓','sb-verified'],
  };
  const [label, cls] = statusMap[status] || statusMap.empty;
  sb.textContent = label;
  sb.className = 'status-badge ' + cls;

  // Catatan
  const catatanInput = document.getElementById('catatanInput');
  catatanInput.value = rec?.data?.catatan || '';
  catatanInput.disabled = status === 'submitted' || status === 'verified' || role === 'penyelia';

  // Verified banner
  renderVerifiedBanner(rec?.data, status);

  // Independence notice — show to penata if today not yet filled but earlier days unverified
  renderIndependenceNotice(idx, role);

  // Render sections
  renderStorage(idx, rec?.data, role, status);
  renderTimbang(idx, rec?.data, role, status);
  updateProgress();
  renderFooter(role, status);
}

function renderVerifiedBanner(recData, status) {
  const wrap = document.getElementById('verifiedBannerWrap');
  if (status !== 'verified') { wrap.innerHTML = ''; return; }
  const verifiedAt = recData?.verifiedAt?.toDate
    ? recData.verifiedAt.toDate().toLocaleString('id-ID',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})
    : '';
  wrap.innerHTML = `
    <div class="verified-banner">
      <div class="verified-icon">✅</div>
      <div class="verified-info">
        <div class="verified-title">Terverifikasi oleh ${recData?.verifiedBy || 'Penyelia'}</div>
        <div class="verified-detail">${verifiedAt ? verifiedAt : ''} · Diisi oleh ${recData?.namaStaff || '-'}</div>
      </div>
      <button class="btn-export" id="btnExportDay">📄 Simpan PDF</button>
    </div>`;
  document.getElementById('btnExportDay')?.addEventListener('click', exportDayPDF);
}

function renderIndependenceNotice(idx, role) {
  const notice = document.getElementById('indepNotice');
  if (role !== 'penata') { notice.classList.remove('show'); return; }
  // Check if any earlier day this week (before idx) is unverified/unsubmitted
  let hasUnverifiedBefore = false;
  for (let i = 0; i < idx; i++) {
    const r = recordData[dayKey(i)];
    if (!r || (r.data.status !== 'verified')) { hasUnverifiedBefore = true; break; }
  }
  const todayKey = dayKey(idx);
  const todayStatus = recordData[todayKey]?.data?.status || 'empty';
  notice.classList.toggle('show', hasUnverifiedBefore && (todayStatus === 'empty' || todayStatus === 'draft'));
}

// ── RENDER STORAGE ────────────────────────────────────────────
function renderStorage(dayIdx, recData, role, status) {
  const canEdit = role === 'penata' && status !== 'submitted' && status !== 'verified';
  const container = document.getElementById('sec-storage');
  const totalPhotos = countTotalPhotos(recData);

  container.innerHTML = STORAGE_ITEMS.map(item => {
    const active = isActiveToday(item.freq, dayIdx);
    const saved  = recData?.storage?.[item.no] || {};
    const isDone = saved.done || false;
    const photos = saved.photos || [];
    const freqLabel = item.freq === 'daily' ? 'Setiap Hari' : item.freq === 'mrf' ? 'Sen/Rab/Jum' : 'Sel/Kam';
    const metodeCls = {PEL:'b-pel',WET:'b-wet',DRY:'b-dry',LAP:'b-lap'}[item.metode]||'b-lap';
    const canAddPhoto = canEdit && totalPhotos < 15;

    const thumbsHtml = photos.map((url,pi) => `
      <span style="position:relative;display:inline-block;">
        <img class="photo-thumb" src="${url}" data-url="${url}"/>
        ${canEdit?`<button class="photo-remove" data-no="${item.no}" data-type="storage" data-pidx="${pi}" style="position:absolute;top:-6px;right:-6px;width:18px;height:18px;font-size:9px;">✕</button>`:''}
      </span>`).join('');

    return `
      <div class="item-card ${isDone&&active?'checked':''} ${!active?'na':''}" id="sc-${item.no}">
        <div class="item-header">
          <div class="item-no">${item.no}</div>
          <div class="item-info">
            <div class="item-area">${item.area}</div>
            <div class="item-objek">${item.objek}</div>
            <div class="item-badges">
              <span class="badge-metode ${metodeCls}">${item.metode}</span>
              <span class="badge-freq">${freqLabel}</span>
              ${!active ? '<span class="item-na-label">· Tidak dijadwalkan hari ini</span>' : ''}
            </div>
          </div>
          <div class="item-check-col">
            <div class="big-check ${isDone&&active?'on':''} ${!active||!canEdit?'disabled':''}"
              data-no="${item.no}" data-type="storage">
              ${isDone&&active?'✅':''}
            </div>
          </div>
        </div>
        ${item.photo && active ? `
          <div class="item-photo-row">
            ${thumbsHtml}
            ${canAddPhoto
              ? `<button class="btn-photo" data-no="${item.no}" data-type="storage">📷 ${photos.length?'Tambah':'Foto'} (kotor)</button>
                 <input type="file" accept="image/*" capture="environment" class="photo-input" id="ph-s-${item.no}"/>`
              : (!canEdit && !photos.length ? `<span style="font-size:11px;color:var(--muted);">Tidak ada foto</span>` : '')
            }
            ${photos.length ? `<span style="font-size:10px;color:var(--muted);width:100%;">${photos.length} foto kondisi kotor</span>` : ''}
          </div>` : ''}
      </div>`;
  }).join('');

  // Checkbox events
  container.querySelectorAll('.big-check:not(.disabled)').forEach(el => {
    el.addEventListener('click', () => {
      const no = parseInt(el.dataset.no);
      const rec = getCurrentRec();
      if (!rec.storage) rec.storage = {};
      if (!rec.storage[no]) rec.storage[no] = {};
      rec.storage[no].done = !rec.storage[no].done;
      hasChanges = true;
      renderStorage(currentDayIdx, rec, role, status);
      updateProgress();
    });
  });

  // Photo button events
  container.querySelectorAll('.btn-photo').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(`ph-s-${btn.dataset.no}`);
      if (input) input.click();
    });
  });

  // Photo input change
  container.querySelectorAll('.photo-input').forEach(input => {
    input.addEventListener('change', async () => {
      const no  = parseInt(input.id.replace('ph-s-',''));
      const file = input.files[0];
      if (!file) return;
      await uploadPhoto(file, 'storage', no, null);
    });
  });

  // Photo remove
  container.querySelectorAll('.photo-remove[data-type="storage"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const no   = parseInt(btn.dataset.no);
      const pidx = parseInt(btn.dataset.pidx);
      const rec  = getCurrentRec();
      if (rec.storage?.[no]?.photos) rec.storage[no].photos.splice(pidx,1);
      hasChanges = true;
      renderStorage(currentDayIdx, rec, role, status);
    });
  });

  // Photo thumb lightbox
  container.querySelectorAll('.photo-thumb').forEach(img => {
    img.addEventListener('click', () => openLightbox(img.dataset.url));
  });
}

    return `
      <div class="item-card ${allDone?'checked':''}" id="tc-${area.no}">

          <div class="item-no">${area.no}</div>
          <div class="item-info">

      if (!rec.timbang) rec.timbang = {};
      if (!rec.timbang[aNo]) rec.timbang[aNo] = {};

  container.querySelectorAll('.sub-photo-btn').forEach(btn => {

  });

// ── CURRENT REC (mutable) ─────────────────────────────────────
function getCurrentRec() {
  const key = dayKey(currentDayIdx);
  if (!recordData[key]) recordData[key] = { docId: null, data: { tanggal: key, status:'draft', storage:{}, timbang:{} } };
  return recordData[key].data;
}

// ── PROGRESS ─────────────────────────────────────────────────
function updateProgress() {
  const rec = getCurrentRec();

  // Storage
  const activeStorage = STORAGE_ITEMS.filter(i => isActiveToday(i.freq, currentDayIdx));
  const doneStorage   = activeStorage.filter(i => rec.storage?.[i.no]?.done).length;
  document.getElementById('prog-storage').textContent = `${doneStorage}/${activeStorage.length}`;

  // Timbang
  const totalT = TIMBANG_ITEMS.reduce((sum,a) => sum+a.sub.length, 0);
  const doneT  = TIMBANG_ITEMS.reduce((sum,a) => {
    return sum + a.sub.filter(s => rec.timbang?.[a.no]?.[s.id]?.done).length;
  }, 0);
  document.getElementById('prog-timbang').textContent = `${doneT}/${totalT}`;
}

// ── FOOTER ───────────────────────────────────────────────────
function renderFooter(role, status) {
  const footer = document.getElementById('footer');
  const inner  = document.getElementById('footerInner');

  if (role === 'penata' && (status === 'empty' || status === 'draft')) {
    footer.classList.add('show');
    inner.innerHTML = `
      <button class="btn-save" id="btnSave">💾 Simpan</button>
      <button class="btn-submit" id="btnSubmit">SUBMIT</button>`;
    document.getElementById('btnSave').addEventListener('click', () => saveRecord(false));
    document.getElementById('btnSubmit').addEventListener('click', () => saveRecord(true));
  } else if (role === 'penyelia' && status === 'submitted') {
    footer.classList.add('show');
    inner.innerHTML = `<button class="btn-approve" id="btnApprove">✅ VERIFIKASI CBB</button>`;
    document.getElementById('btnApprove').addEventListener('click', verifyCBB);
  } else {
    footer.classList.remove('show');
  }
}

// ── SAVE ─────────────────────────────────────────────────────
async function saveRecord(isSubmit) {
  const key = dayKey(currentDayIdx);
  const rec = getCurrentRec();
  const btn = document.getElementById(isSubmit?'btnSubmit':'btnSave');
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="spinner-sm"></span>'; }

  const newStatus = isSubmit ? 'submitted' : 'draft';
  const docData = {
    ...rec,
    tanggal: key,
    weekMonth: key.substring(0,7),
    hariNama: DAY_NAMES[currentDayIdx],
    status: newStatus,
    namaStaff: currentUser.name,
    submittedBy: currentUser.uid,
    updatedAt: serverTimestamp(),
    catatan: document.getElementById('catatanInput').value.trim(),
  };

  try {
    const existing = recordData[key];
    if (existing?.docId) {
      await updateDoc(doc(db,'cbb_records', existing.docId), docData);
    } else {
      const ref = await addDoc(collection(db,'cbb_records'), { ...docData, createdAt: serverTimestamp() });
      recordData[key] = { docId: ref.id, data: docData };
    }
    recordData[key] = { ...recordData[key], data: { ...docData } };
    hasChanges = false;
    showToast(isSubmit ? '✅ CBB berhasil disubmit!' : '💾 Draft tersimpan.', 'success');
    buildDayTabs();
    renderDay();
  } catch(e) {
    showToast('Gagal: '+e.message, 'error');
  } finally {
    if (btn) { btn.disabled=false; btn.innerHTML=isSubmit?'SUBMIT':'💾 Simpan'; }
  }
}

// ── VERIFY ───────────────────────────────────────────────────
async function verifyCBB() {
  const key = dayKey(currentDayIdx);
  const existing = recordData[key];
  if (!existing?.docId) return;
  const btn = document.getElementById('btnApprove');
  btn.disabled=true; btn.innerHTML='<span class="spinner-sm"></span>';
  try {
    const now = new Date();
    await updateDoc(doc(db,'cbb_records', existing.docId), {
      status:'verified',
      verifiedBy: currentUser.name,
      verifiedAt: serverTimestamp(),
    });
    recordData[key].data.status = 'verified';
    recordData[key].data.verifiedBy = currentUser.name;
    recordData[key].data.verifiedAt = { toDate: () => now }; // local fallback for immediate render
    showToast('✅ CBB terverifikasi! Tersimpan sebagai bukti.', 'success');
    buildDayTabs();
    renderDay();
  } catch(e) {
    showToast('Gagal: '+e.message, 'error');
    btn.disabled=false; btn.innerHTML='✅ VERIFIKASI CBB';
  }
}

// ── EXPORT PDF ───────────────────────────────────────────────
function exportDayPDF() {
  const idx = currentDayIdx;
  const key = dayKey(idx);
  const rec = recordData[key]?.data;
  if (!rec) { showToast('Tidak ada data untuk diekspor.','error'); return; }

  const activeStorage = STORAGE_ITEMS.filter(i => isActiveToday(i.freq, idx));
  const photoAttachments = []; // {label, url}

  const storageRows = activeStorage.map(item => {
    const saved = rec.storage?.[item.no] || {};
    const photos = saved.photos || [];
    photos.forEach((url,pi) => photoAttachments.push({ label: `No.${item.no} — ${item.area} (${item.objek})${photos.length>1?' #'+(pi+1):''}`, url }));
    return `
      <tr>
        <td class="c-no">${item.no}</td>
        <td class="c-check">${saved.done ? '✓' : ''}</td>
        <td>${item.area} — ${item.objek}</td>
        <td style="text-align:center;">${item.metode}</td>
        <td class="c-photo">${photos.length ? '📷 x'+photos.length : ''}</td>
      </tr>`;
  }).join('');

  const timbangRows = TIMBANG_ITEMS.map(area => {
    const areaData = rec.timbang?.[area.no] || {};
    return area.sub.map((sub,i) => {
      const photos = areaData[sub.id]?.photos || [];
      photos.forEach((url,pi) => photoAttachments.push({ label: `${area.area} — ${sub.objek}${photos.length>1?' #'+(pi+1):''}`, url }));
      return `
      <tr>
        <td class="c-no">${i===0 ? area.no : ''}</td>
        <td class="c-check">${areaData[sub.id]?.done ? '✓' : ''}</td>
        <td>${i===0 ? '<b>'+area.area+'</b><br>' : ''}${sub.objek}</td>
        <td style="text-align:center;">${sub.metode}</td>
        <td class="c-photo">${photos.length ? '📷 x'+photos.length : ''}</td>
      </tr>`;
    }).join('');
  }).join('');

  const verifiedAt = rec.verifiedAt?.toDate
    ? rec.verifiedAt.toDate().toLocaleString('id-ID',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'})
    : '-';
  const now = new Date().toLocaleString('id-ID',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});

  const photoSection = photoAttachments.length ? `
    <div class="p-sec-title">Lampiran Foto (${photoAttachments.length})</div>
    <div style="display:flex;flex-wrap:wrap;gap:3mm;margin-bottom:4mm;">
      ${photoAttachments.map(p => `
        <div style="width:38mm;">
          <img src="${p.url}" style="width:38mm;height:38mm;object-fit:cover;border:1px solid #999;border-radius:1mm;display:block;"/>
          <div style="font-size:6pt;color:#444;margin-top:1mm;line-height:1.3;">${p.label}</div>
        </div>
      `).join('')}
    </div>` : '';

  document.getElementById('printArea').innerHTML = `
    <div class="p-header">
      <div class="p-title">CHECKLIST KEBERSIHAN GUDANG BAHAN BAKU & KEMAS (CBB)</div>
      <div class="p-sub">PT Nutrifood Indonesia · Cibitung Plant · F.P.8AE002</div>
    </div>
    <div class="p-meta">
      <div><b>Hari / Tanggal</b>: ${DAY_NAMES[idx]}, ${weekDates[idx]?.toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'})}</div>
      <div><b>Diisi oleh</b>: ${rec.namaStaff || '-'}</div>
      <div><b>Status</b>: Terverifikasi</div>
      <div><b>Diverifikasi oleh</b>: ${rec.verifiedBy || '-'}</div>
      <div><b>Waktu Verifikasi</b>: ${verifiedAt}</div>
    </div>

    <div class="p-sec-title">A. Storage Bahan Baku & Kemas</div>
    <table class="p-table">
      <thead><tr><th class="c-no">No</th><th class="c-check">✓</th><th>Area / Objek</th><th>Metode</th><th class="c-photo">Foto</th></tr></thead>
      <tbody>${storageRows}</tbody>
    </table>

    <div class="p-sec-title">B. Penimbangan</div>
    <table class="p-table">
      <thead><tr><th class="c-no">No</th><th class="c-check">✓</th><th>Area / Objek</th><th>Metode</th><th class="c-photo">Foto</th></tr></thead>
      <tbody>${timbangRows}</tbody>
    </table>

    ${photoSection}

    ${rec.catatan ? `<div class="p-sec-title">Catatan</div><div style="font-size:8.5pt;padding:2mm 0;">${rec.catatan}</div>` : ''}

    <div class="p-sign">
      <div class="p-sign-box">
        <div class="p-sign-line"></div>
        <div class="p-sign-label">Penata (Diisi oleh)</div>
        <div class="p-sign-date">${rec.namaStaff || '-'}</div>
      </div>
      <div class="p-sign-box">
        <div class="p-sign-line"></div>
        <div class="p-sign-label">Penyelia (Diverifikasi oleh)</div>
        <div class="p-sign-date">${rec.verifiedBy || '-'} · ${verifiedAt}</div>
      </div>
    </div>

    <div class="p-footer">
      <span>Dicetak: ${now}</span>
      <span>CBB · ${DAY_NAMES[idx]} ${key}</span>
    </div>
  `;
  setTimeout(() => window.print(), 200);
}

// ── PHOTO COUNT HELPER ───────────────────────────────────────
function countTotalPhotos(recData) {
  if (!recData) recData = getCurrentRec();
  let total = 0;
  Object.values(recData.storage||{}).forEach(s => total += (s.photos?.length||0));
  Object.values(recData.timbang||{}).forEach(area => {
    Object.values(area||{}).forEach(s => total += (s.photos?.length||0));
  });
  return total;
}

// ── PHOTO UPLOAD ─────────────────────────────────────────────
async function uploadPhoto(file, section, no, subId) {
  const rec = getCurrentRec();
  if (countTotalPhotos(rec) >= 15) {
    showToast('⚠️ Maksimal 15 foto per hari sudah tercapai.', 'error');
    return;
  }
  const key  = dayKey(currentDayIdx);
  const path = `cbb/${key}/${section}_${no}${subId?'_'+subId:''}_${Date.now()}`;
  try {
    showToast('⏳ Mengupload foto...', '');
    const storageRef = sRef(storage, path);
    await uploadBytes(storageRef, file);
    const url = await getDownloadURL(storageRef);
    const role = currentUser?.role;
    const status = rec.status || 'draft';
    if (section === 'storage') {
      if (!rec.storage[no]) rec.storage[no] = {};
      if (!rec.storage[no].photos) rec.storage[no].photos = [];
      rec.storage[no].photos.push(url);
      renderStorage(currentDayIdx, rec, role, status);
    } else {
      if (!rec.timbang[no]) rec.timbang[no] = {};
      if (!rec.timbang[no][subId]) rec.timbang[no][subId] = {};
      if (!rec.timbang[no][subId].photos) rec.timbang[no][subId].photos = [];
      rec.timbang[no][subId].photos.push(url);
      renderTimbang(currentDayIdx, rec, role, status);
    }
    hasChanges = true;
    showToast('✅ Foto berhasil diupload! ('+countTotalPhotos(rec)+'/15)', 'success');
  } catch(e) {
    showToast('Gagal upload foto: '+e.message, 'error');
  }
}

// ── SECTION TABS ─────────────────────────────────────────────
document.querySelectorAll('.sec-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    currentSec = btn.dataset.sec;
    document.querySelectorAll('.sec-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('sec-storage').style.display = currentSec==='storage'?'block':'none';
    document.getElementById('sec-timbang').style.display = currentSec==='timbang'?'block':'none';
    document.getElementById('catatanArea').style.display = 'block';
  });
});

// ── LIGHTBOX ─────────────────────────────────────────────────
function openLightbox(url) {
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('closeLightbox').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('open');
});

// ── UTILS ─────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type) {
  clearTimeout(toastTimer);
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show '+(type||'');
  toastTimer = setTimeout(() => el.className='toast', 3000);
}
window.addEventListener('beforeunload', e => { if(hasChanges) e.returnValue='Ada perubahan belum disimpan!'; });
</script>
