<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUDANG — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --accent: #e8ff00;
    --accent-dim: rgba(232,255,0,0.08);
    --text: #f0f0f0;
    --muted: #555;
    --error: #ff4444;
    --success: #00e676;
    --role-penyelia: #e8ff00;
    --role-admin: #00cfff;
    --role-petugas: #ff6b35;
    --role-penata: #b388ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,255,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,255,0,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(232,255,0,0.04) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .wrapper {
    width: 100%;
    max-width: 440px;
    padding: 24px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.5s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .header { margin-bottom: 40px; text-align: center; }
  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent-dim);
    border: 1px solid rgba(232,255,0,0.15);
    border-radius: 4px;
    padding: 6px 14px;
    margin-bottom: 20px;
  }
  .logo-dot {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(232,255,0,0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(232,255,0,0); }
  }
  .logo-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    letter-spacing: 4px;
    color: var(--text);
    line-height: 1;
    margin-bottom: 8px;
  }
  .subtitle { font-size: 13px; color: var(--muted); letter-spacing: 1px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .role-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 28px;
  }
  .role-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 8px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .role-btn .role-icon { font-size: 20px; margin-bottom: 6px; display: block; }
  .role-btn .role-name {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
    display: block;
    transition: color 0.2s;
  }
  .role-btn:hover { border-color: #333; background: rgba(255,255,255,0.02); }
  .role-btn.active[data-role="penyelia"] { border-color: var(--role-penyelia); background: rgba(232,255,0,0.05); box-shadow: 0 0 20px rgba(232,255,0,0.08); }
  .role-btn.active[data-role="penyelia"] .role-name { color: var(--role-penyelia); }
  .role-btn.active[data-role="admin"] { border-color: var(--role-admin); background: rgba(0,207,255,0.05); box-shadow: 0 0 20px rgba(0,207,255,0.08); }
  .role-btn.active[data-role="admin"] .role-name { color: var(--role-admin); }
  .role-btn.active[data-role="petugas"] { border-color: var(--role-petugas); background: rgba(255,107,53,0.05); box-shadow: 0 0 20px rgba(255,107,53,0.08); }
  .role-btn.active[data-role="petugas"] .role-name { color: var(--role-petugas); }
  .role-btn.active[data-role="penata"] { border-color: var(--role-penata); background: rgba(179,136,255,0.05); box-shadow: 0 0 20px rgba(179,136,255,0.08); }
  .role-btn.active[data-role="penata"] .role-name { color: var(--role-penata); }
  .role-btn.active[data-role="petugas-produksi"] { border-color:#00e5ff; background:rgba(0,229,255,0.05); box-shadow:0 0 20px rgba(0,229,255,0.08); }
.role-btn.active[data-role="petugas-produksi"] .role-name { color:#00e5ff; }
.role-btn.active[data-role="penyelia-produksi"] { border-color:#ff9500; background:rgba(255,149,0,0.05); box-shadow:0 0 20px rgba(255,149,0,0.08); }
.role-btn.active[data-role="penyelia-produksi"] .role-name { color:#ff9500; }
  .divider { height: 1px; background: var(--border); margin-bottom: 28px; }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .field input {
    width: 100%;
    background: #0a0a0a;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,255,0,0.06); }
  .field input::placeholder { color: #333; letter-spacing: 0; font-family: 'DM Sans', sans-serif; }
  .hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    padding: 8px 12px;
    background: rgba(179,136,255,0.05);
    border: 1px solid rgba(179,136,255,0.1);
    border-radius: 6px;
    display: none;
  }
  .hint.show { display: block; }
  .btn-login {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
  }
  .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(232,255,0,0.2); }
  .btn-login:active { transform: translateY(0); }
  .btn-login:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
  .message {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
    animation: fadeUp 0.2s ease;
  }
  .message.error { background: rgba(255,68,68,0.08); border: 1px solid rgba(255,68,68,0.2); color: var(--error); display: block; }
  .message.success { background: rgba(0,230,118,0.08); border: 1px solid rgba(0,230,118,0.2); color: var(--success); display: block; }
  .footer { text-align: center; margin-top: 24px; font-size: 11px; color: #2a2a2a; font-family: 'DM Mono', monospace; letter-spacing: 1px; }
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Dashboard */
  #app { display: none; text-align: center; animation: fadeUp 0.4s ease both; }
  #app .welcome-role { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 3px; margin-bottom: 8px; }
  #app .welcome-sub { color: var(--muted); font-size: 14px; margin-bottom: 16px; }
  #app .role-tag {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  #app .modules-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
  #app .module-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 16px;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
  }
  #app .module-card:hover { border-color: #333; background: rgba(255,255,255,0.02); transform: translateY(-2px); }
  #app .module-card .m-icon { font-size: 24px; margin-bottom: 10px; display: block; }
  #app .module-card .m-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  #app .module-card .m-desc { font-size: 11px; color: var(--muted); }
  .btn-logout {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 10px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-logout:hover { border-color: var(--error); color: var(--error); }
  @media (max-width: 480px) { .title { font-size: 48px; } .card { padding: 24px 20px; } }
</style>
</head>
<body>

<div class="wrapper">

  <!-- LOGIN SCREEN -->
  <div id="loginScreen">
    <div class="header">
      <div class="logo-badge">
        <div class="logo-dot"></div>
        <span class="logo-text">PT Nutrifood Indonesia</span>
      </div>
      <div class="title">GUDANG</div>
      <div class="subtitle">Sistem Manajemen Gudang · Cibitung</div>
    </div>

    <div class="card">
      <div class="section-label">Pilih Jabatan</div>
      <div class="role-grid">
        <button class="role-btn" data-role="penyelia" id="btn-penyelia">
          <span class="role-icon">👔</span>
          <span class="role-name">Penyelia</span>
        </button>
        <button class="role-btn" data-role="admin" id="btn-admin">
          <span class="role-icon">🖥️</span>
          <span class="role-name">Admin</span>
        </button>
        <button class="role-btn" data-role="petugas" id="btn-petugas">
          <span class="role-icon">🦺</span>
          <span class="role-name">Petugas</span>
        </button>
        <button class="role-btn" data-role="penata" id="btn-penata">
          <span class="role-icon">📦</span>
          <span class="role-name">Penata</span>
        </button>
        <button class="role-btn" data-role="petugas-produksi" id="btn-petugas-produksi">
  <span class="role-icon">🏭</span>
  <span class="role-name">Ptgs Produksi</span>
</button>
<button class="role-btn" data-role="penyelia-produksi" id="btn-penyelia-produksi">
  <span class="role-icon">👷</span>
  <span class="role-name">Pnylia Produksi</span>
</button>
      </div>

      <div class="divider"></div>

      <div class="field">
        <label>NIK</label>
        <input type="text" id="nikInput" placeholder="Masukkan NIK kamu" maxlength="20" />
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="passInput" placeholder="Masukkan password" />
        <div class="hint" id="penataHint">
          💡 Penata: password adalah tanggal lahir · format DDMMYYYY · contoh: 15031998
        </div>
      </div>

      <button class="btn-login" id="loginBtn">MASUK</button>
      <div class="message" id="msgBox"></div>
    </div>

    <div class="footer">GUDANG SYS · v1.0 · CIBITUNG PLANT</div>
  </div>

  <!-- DASHBOARD -->
  <div id="app">
    <div id="welcomeRole" class="welcome-role"></div>
    <div id="welcomeSub" class="welcome-sub"></div>
    <div id="roleTag" class="role-tag"></div>
    <div class="modules-grid" id="modulesGrid"></div>
    <button class="btn-logout" id="logoutBtn">KELUAR</button>
  </div>

</div>

<script type="module">
import { initializeApp }           from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
                                   from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import { getFirestore, doc, getDoc }
                                   from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

// ── Firebase Config ──────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyBK8eNz6lYGT9dI5b01sCPdRFHBU8_i_40",
  authDomain:        "gudang-cibitung.firebaseapp.com",
  projectId:         "gudang-cibitung",
  storageBucket:     "gudang-cibitung.firebasestorage.app",
  messagingSenderId: "570827859176",
  appId:             "1:570827859176:web:ccefaeeb0b964bd39dd55d"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── Module access per role ───────────────────────────────────
const MODULES = {
  penyelia: [
    { icon:'📋', name:'JPM',        desc:'Upload jadwal tugas',   page:'jpm.html' },
    { icon:'🧹', name:'CBB',        desc:'Lihat & konfirmasi',    page:'cbb.html' },
    { icon:'🌾', name:'Form Ayak',  desc:'Lihat & konfirmasi',    page:'ayak.html' },
    { icon:'👟', name:'Form Sepatu',desc:'Lihat & konfirmasi',    page:'sepatu.html' },
    { icon:'🚨', name:'Aduan',      desc:'Lihat & respons',       page:'aduan.html' },
    { icon:'💡', name:'Saran',      desc:'Lihat & respons',       page:'saran.html' },
    { icon:'📦', name:'IOT',        desc:'Input permintaan BB',   page:'iot.html' },
    { icon:'⚙️', name:'CPB Admin', desc:'Formula & Work Order', page:'cpb-admin.html' },
    { icon:'📋', name:'CPB Form', desc:'Checklist serah terima', page:'cpb-form.html' },
  ],
  admin: [
    { icon:'📋', name:'JPM',        desc:'Upload jadwal tugas',   page:'jpm.html' },
    { icon:'🧹', name:'CBB',        desc:'Lihat data',            page:'cbb.html' },
    { icon:'🌾', name:'Form Ayak',  desc:'Lihat data',            page:'ayak.html' },
    { icon:'👟', name:'Form Sepatu',desc:'Lihat data',            page:'sepatu.html' },
    { icon:'🚨', name:'Aduan',      desc:'Lihat data',            page:'aduan.html' },
    { icon:'💡', name:'Saran',      desc:'Lihat data',            page:'saran.html' },
    { icon:'📦', name:'IOT',        desc:'Input permintaan BB',   page:'iot.html' },
    { icon:'⚙️', name:'CPB Admin', desc:'Formula & Work Order', page:'cpb-admin.html' },
    { icon:'📋', name:'CPB Form', desc:'Checklist serah terima', page:'cpb-form.html' },
  ],
  petugas: [
    { icon:'📋', name:'JPM',        desc:'Lihat jadwal',          page:'jpm.html' },
    { icon:'🧹', name:'CBB',        desc:'Lihat data',            page:'cbb.html' },
    { icon:'🌾', name:'Form Ayak',  desc:'Lihat data',            page:'ayak.html' },
    { icon:'👟', name:'Form Sepatu',desc:'Lihat data',            page:'sepatu.html' },
    { icon:'🚨', name:'Aduan',      desc:'Isi laporan',           page:'aduan.html' },
    { icon:'💡', name:'Saran',      desc:'Kirim saran',           page:'saran.html' },
    { icon:'📦', name:'IOT',        desc:'Lihat & konfirmasi',    page:'iot.html' },
    { icon:'📋', name:'CPB Form', desc:'Checklist serah terima', page:'cpb-form.html' },
  ],
  penata: [
    { icon:'📋', name:'JPM',        desc:'Lihat jadwal',          page:'jpm.html' },
    { icon:'🧹', name:'CBB',        desc:'Isi checklist',         page:'cbb.html' },
    { icon:'🌾', name:'Form Ayak',  desc:'Isi form',              page:'ayak.html' },
    { icon:'👟', name:'Form Sepatu',desc:'Isi form',              page:'sepatu.html' },
    { icon:'🚨', name:'Aduan',      desc:'Isi laporan',           page:'aduan.html' },
    { icon:'💡', name:'Saran',      desc:'Kirim saran',           page:'saran.html' },
    { icon:'📦', name:'IOT',        desc:'Lihat notifikasi',      page:'iot.html' },
  ],
  'petugas-produksi': [
  { icon:'⚙️', name:'Assembly', desc:'Cek serah terima', page:'assembly.html' },
  { icon:'📋', name:'CPB Form', desc:'Checklist serah terima', page:'cpb-form.html' },
],
'penyelia-produksi': [
  { icon:'⚙️', name:'Assembly', desc:'Approve produksi', page:'assembly.html' },
  { icon:'📋', name:'CPB Form', desc:'Checklist serah terima', page:'cpb-form.html' },
],
};

const ROLE_COLORS = {
  penyelia: { color:'#e8ff00', bg:'rgba(232,255,0,0.1)' },
  admin:    { color:'#00cfff', bg:'rgba(0,207,255,0.1)' },
  petugas:  { color:'#ff6b35', bg:'rgba(255,107,53,0.1)' },
  penata:   { color:'#b388ff', bg:'rgba(179,136,255,0.1)' },
  'petugas-produksi':  { color: '#00e5ff', bg: 'rgba(0,229,255,0.1)' },
'penyelia-produksi': { color: '#ff9500', bg: 'rgba(255,149,0,0.1)' },
};

// ── State ────────────────────────────────────────────────────
let selectedRole = null;

// ── Auth state listener ──────────────────────────────────────
onAuthStateChanged(auth, async (firebaseUser) => {
  if (firebaseUser) {
    try {
      const snap = await getDoc(doc(db, 'users', firebaseUser.uid));
      if (snap.exists()) {
        showDashboard(snap.data());
      } else {
        // Auth exists but no Firestore profile → kick out
        await signOut(auth);
        showMsg('Akun tidak ditemukan. Hubungi admin.', 'error');
        resetLoginBtn();
      }
    } catch (e) {
      showMsg('Gagal memuat profil. Coba lagi.', 'error');
      resetLoginBtn();
    }
  } else {
    showLoginScreen();
  }
});

// ── Role buttons ─────────────────────────────────────────────
document.querySelectorAll('.role-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    selectedRole = btn.dataset.role;
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('penataHint').classList.toggle('show', selectedRole === 'penata');
    showMsg('', '');
  });
});

// ── Login ────────────────────────────────────────────────────
document.getElementById('loginBtn').addEventListener('click', handleLogin);
document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

async function handleLogin() {
  const nik  = document.getElementById('nikInput').value.trim();
  const pass = document.getElementById('passInput').value.trim();
  const btn  = document.getElementById('loginBtn');

  if (!selectedRole)   { showMsg('Pilih jabatan dulu ya!', 'error'); return; }
  if (!nik || !pass)   { showMsg('NIK dan password tidak boleh kosong.', 'error'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  try {
    const email = `${nik}@gudang-cibitung.internal`;
    const cred  = await signInWithEmailAndPassword(auth, email, pass);

    // Verify role matches what user selected
    const snap = await getDoc(doc(db, 'users', cred.user.uid));
    if (snap.exists() && snap.data().role === selectedRole) {
  showDashboard(snap.data());
} else {
      await signOut(auth);
      showMsg('Jabatan tidak sesuai dengan akun ini.', 'error');
      resetLoginBtn();
    }
  } catch (err) {
    const msgs = {
      'auth/invalid-credential':   'NIK atau password salah.',
      'auth/user-not-found':        'NIK tidak terdaftar.',
      'auth/wrong-password':        'Password salah.',
      'auth/too-many-requests':     'Terlalu banyak percobaan. Coba lagi nanti.',
      'auth/network-request-failed':'Tidak ada koneksi internet.',
    };
    showMsg(msgs[err.code] || 'Login gagal. Coba lagi.', 'error');
    resetLoginBtn();
  }
}

// ── Dashboard ────────────────────────────────────────────────
function showDashboard(userData) {
  document.getElementById('loginScreen').style.display = 'none';
  const appEl = document.getElementById('app');
  appEl.style.display = 'block';

  const rc       = ROLE_COLORS[userData.role] || ROLE_COLORS.penata;
  const roleName = userData.role.charAt(0).toUpperCase() + userData.role.slice(1);
  const firstName = (userData.name || 'User').split(' ')[0];

  document.getElementById('welcomeRole').textContent = `Halo, ${firstName}!`;
  document.getElementById('welcomeRole').style.color  = rc.color;
  document.getElementById('welcomeSub').textContent   = 'Sistem Gudang · Cibitung Plant';

  const tag = document.getElementById('roleTag');
  tag.textContent      = roleName;
  tag.style.color      = rc.color;
  tag.style.background = rc.bg;
  tag.style.border     = `1px solid ${rc.color}40`;

  const mods = MODULES[userData.role] || [];
  document.getElementById('modulesGrid').innerHTML = mods.map(m => `
    <div class="module-card" data-page="${m.page}">
      <span class="m-icon">${m.icon}</span>
      <div class="m-name">${m.name}</div>
      <div class="m-desc">${m.desc}</div>
    </div>
  `).join('');

  document.querySelectorAll('.module-card').forEach(card => {
    card.addEventListener('click', () => {
      const page = card.dataset.page;
      // Later: window.location.href = page;
      window.location.href = page;
    });
  });
}

function showLoginScreen() {
  document.getElementById('loginScreen').style.display = 'block';
  document.getElementById('app').style.display = 'none';
  document.getElementById('nikInput').value = '';
  document.getElementById('passInput').value = '';
  document.getElementById('penataHint').classList.remove('show');
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  selectedRole = null;
  showMsg('', '');
  resetLoginBtn();
}

// ── Logout ───────────────────────────────────────────────────
document.getElementById('logoutBtn').addEventListener('click', async () => {
  await signOut(auth);
});

// ── Utils ────────────────────────────────────────────────────
function showMsg(text, type) {
  const box = document.getElementById('msgBox');
  box.textContent = text;
  box.className   = 'message ' + (type || '');
}

function resetLoginBtn() {
  const btn = document.getElementById('loginBtn');
  btn.disabled  = false;
  btn.innerHTML = 'MASUK';
}
</script>
</body>
</html>
